services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - db-data:/app/data
    environment:
      - WBMS_DATABASE_URL=sqlite:////app/data/wbms.db
      - WBMS_SECRET_KEY=ab608e384edf5a9032436c28d5989957c7f232e04066a9b8146212821ee97ac9
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=bms/data
      - MQTT_USERNAME=wbms-backend
      - MQTT_PASSWORD=mito1234
      - FRONTEND_ORIGIN=https://wbms.systems
      - CONNECTED_CELLS=3
      - PARALLEL_COUNT=1
      - GOOGLE_CLIENT_ID=1017515470953-bpdre0hbqc5r7ejsf4rr466ndbgv5isg.apps.googleusercontent.com
    depends_on:
      - mosquitto
    # No ports exposed — only reachable via the frontend Nginx proxy
    # To access API docs directly, uncomment:
    # ports:
    #   - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend

volumes:
  db-data:
  mosquitto-data:
  mosquitto-log:
